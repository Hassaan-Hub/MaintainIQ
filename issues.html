<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issues | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Issues / Requests</h2>
        <p class="text-slate-500 text-sm">Triage, assign, and track all maintenance requests</p>
      </div>
    </div>

    <div class="filter-bar">
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="reported">Reported</option>
        <option value="triaged">Triaged</option>
        <option value="assigned">Assigned</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="urgencyFilter">
        <option value="">All Urgency</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="categoryFilter">
        <option value="">All Categories</option>
      </select>
      <input type="text" placeholder="Search issues..." id="searchInput" class="min-w-[200px]">
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Asset</th>
              <th>Description</th>
              <th>Category</th>
              <th>Urgency</th>
              <th>Status</th>
              <th>Assigned To</th>
              <th>Reported</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="issues-list">
            <tr><td colspan="9" class="text-center p-8"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="triageModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Triage Issue</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="triageIssueInfo" class="bg-slate-50 rounded-lg p-4 mb-5"></div>
        <div class="input-group">
          <label>Category</label>
          <select id="triageCategory">
            <option value="">Select...</option>
            <option>HVAC</option>
            <option>Electrical</option>
            <option>Plumbing</option>
            <option>IT Equipment</option>
            <option>Furniture</option>
            <option>Vehicle</option>
            <option>Medical</option>
            <option>Kitchen</option>
            <option>Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Urgency</label>
          <select id="triageUrgency">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
        <div class="input-group">
          <label>Assign To</label>
          <select id="triageAssignTo">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="input-group">
          <label>Triage Notes</label>
          <textarea id="triageNotes" rows="3" placeholder="Add notes about this issue..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="rejectBtn">Reject</button>
        <button class="btn btn-secondary" id="cancelTriageBtn">Cancel</button>
        <button class="btn btn-primary" id="saveTriageBtn">Save Triage</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/issues.js"></script>
</body>
</html>
