<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>MaintainIQ</h1>
      </div>

      <form id="signupForm">
        <div class="input-group">
          <label>Organization Name</label>
          <input type="text" id="orgName" placeholder="e.g. ABC Corporation" required>
        </div>
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="hassaan" required>
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="input-group">
          <label>Phone (optional)</label>
          <input type="tel" id="phone" placeholder="+92 234 567 890">
        </div>

        <button type="submit" class="btn btn-primary mt-2" id="signupBtn">
          Create Account
        </button>

        <p class="text-center mt-5 text-sm text-slate-500">
          Already have an account? <a href="/login.html" class="text-blue-600 font-medium no-underline">Sign in</a>
        </p>
      </form>
    </div>
  </div>

  <script type="module" src="/js/auth-signup.js"></script>
</body>
</html>
