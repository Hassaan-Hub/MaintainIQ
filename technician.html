<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>My Assigned Tasks</h2>
        <p class="text-slate-500 text-sm">Issues assigned to you</p>
      </div>
    </div>

    <div class="flex gap-2 mb-6">
      <button class="btn btn-sm tab-btn bg-blue-600 text-white" data-tab="active">Active</button>
      <button class="btn btn-sm tab-btn bg-slate-100 text-slate-600" data-tab="resolved">Completed</button>
    </div>

    <div id="tasks-list">
      <div class="spinner"></div>
    </div>
  </main>

  <div class="modal-overlay" id="issueModal">
    <div class="modal max-w-[640px]">
      <div class="modal-header">
        <h3>Issue Details</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="issueDetail">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelIssueBtn">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/technician.js"></script>
</body>
</html>
