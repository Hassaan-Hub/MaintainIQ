<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Dashboard</h2>
        <p class="text-slate-500 text-sm">Overview of your maintenance operations</p>
      </div>
      <div class="flex gap-2">
        <a href="/assets.html" class="btn btn-primary btn-sm">+ Add Asset</a>
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6">
      <div class="stat-card">
        <div class="flex items-center justify-between gap-2">
          <div>
            <div class="stat-value" id="stat-assets">-</div>
            <div class="stat-label">Total Assets</div>
          </div>
          <div class="w-9 h-9 md:w-10 md:h-10 bg-blue-100 rounded-xl flex items-center justify-center shrink-0">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" class="w-5 h-5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div class="flex items-center justify-between gap-2">
          <div>
            <div class="stat-value text-red-600" id="stat-open">-</div>
            <div class="stat-label">Open Issues</div>
          </div>
          <div class="w-9 h-9 md:w-10 md:h-10 bg-red-100 rounded-xl flex items-center justify-center shrink-0">
            <svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" class="w-5 h-5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div class="flex items-center justify-between gap-2">
          <div>
            <div class="stat-value text-green-600" id="stat-resolved">-</div>
            <div class="stat-label">Resolved This Month</div>
          </div>
          <div class="w-9 h-9 md:w-10 md:h-10 bg-green-100 rounded-xl flex items-center justify-center shrink-0">
            <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" class="w-5 h-5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
        </div>
      </div>
      <div class="stat-card">
        <div class="flex items-center justify-between gap-2">
          <div>
            <div class="stat-value text-amber-500" id="stat-critical">-</div>
            <div class="stat-label">Critical / Urgent</div>
          </div>
          <div class="w-9 h-9 md:w-10 md:h-10 bg-amber-100 rounded-xl flex items-center justify-center shrink-0">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" class="w-5 h-5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-6" id="alerts-card">
      <div class="card-header">
        <h3 class="flex items-center gap-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" class="w-[18px] h-[18px]"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Preventive Alerts
        </h3>
      </div>
      <div class="card-body" id="alerts-list">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="card mb-6">
      <div class="card-header">
        <h3>Recent Issues</h3>
        <a href="/issues.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Issue</th>
              <th>Asset</th>
              <th>Status</th>
              <th>Urgency</th>
              <th>Reported</th>
            </tr>
          </thead>
          <tbody id="recent-issues">
            <tr><td colspan="5" class="text-center p-8"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card hidden" id="tech-card">
      <div class="card-header">
        <h3>Technician Workload</h3>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Technician</th>
              <th>Assigned</th>
              <th>In Progress</th>
              <th>Resolved (30d)</th>
            </tr>
          </thead>
          <tbody id="tech-workload">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
