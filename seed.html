<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Data Seeder | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card max-w-[500px]">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>Demo Data Seeder</h1>
      </div>

      <p class="text-slate-500 text-sm mb-6 text-center">
        Seed your organization with realistic demo data for hackathon presentation.
      </p>

      <div id="status" class="mb-4"></div>

      <button class="btn btn-primary" id="seedBtn">Seed Demo Data</button>

      <p class="text-slate-400 text-xs mt-4 text-center">
        This will create assets, technicians, and sample issues for demo purposes.
        <br>You must be logged in as an admin first.
      </p>

      <p class="text-center mt-5 text-sm text-slate-500">
        <a href="/login.html" class="text-blue-600 font-medium no-underline">Go to Login</a>
      </p>
    </div>
  </div>

  <script type="module" src="/js/seed.js"></script>
</body>
</html>
