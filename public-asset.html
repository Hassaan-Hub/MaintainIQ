<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="m-0">
  <div class="public-asset-page">
    <div class="public-header">
      <div class="flex items-center gap-2 justify-center mb-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span class="font-bold">MaintainIQ</span>
      </div>
      <h1 id="assetName">Loading...</h1>
      <p id="assetLocation"></p>
    </div>

    <div class="max-w-[600px] mx-auto p-4">
      <div id="loadingState" class="text-center p-12">
        <div class="spinner"></div>
        <p class="text-slate-500 mt-4">Loading asset details...</p>
      </div>

      <div id="notFoundState" class="hidden text-center p-12">
        <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" class="w-16 h-16 mx-auto mb-4"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <h3 class="font-semibold mb-2">Asset Not Found</h3>
        <p class="text-slate-500">This asset may have been removed or the QR code is invalid.</p>
      </div>

      <div id="assetContent" class="hidden">
        <div class="card mb-5">
          <div class="card-body">
            <div class="flex items-center justify-between gap-2 mb-4 flex-wrap">
              <h2 class="font-bold text-xl" id="assetTitle"></h2>
              <span class="asset-status-indicator" id="assetStatus"></span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
              <div>
                <span class="text-slate-500">Category</span>
                <div class="font-medium" id="assetCategory">-</div>
              </div>
              <div>
                <span class="text-slate-500">Location</span>
                <div class="font-medium" id="assetLocationInfo">-</div>
              </div>
              <div>
                <span class="text-slate-500">Installed</span>
                <div class="font-medium" id="assetInstall">-</div>
              </div>
              <div>
                <span class="text-slate-500">Warranty</span>
                <div class="font-medium" id="assetWarranty">-</div>
              </div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary w-full mb-5 py-3.5" id="reportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Report an Issue
        </button>

        <div class="tab-btns">
          <button class="active" data-tab="report">Report Issue</button>
          <button data-tab="history">Service History</button>
          <button data-tab="issues">Open Issues</button>
        </div>

        <div id="tab-report">
          <div class="card">
            <div class="card-body">
              <form id="reportForm">
                <div class="input-group">
                  <label>Describe the Issue *</label>
                  <textarea id="reportDesc" rows="4" placeholder="What's wrong? Be as specific as possible..." required></textarea>
                </div>
                <div class="input-group">
                  <label>Urgency Level</label>
                  <select id="reportUrgency">
                    <option value="low">Low — Minor issue, not urgent</option>
                    <option value="medium" selected>Medium — Needs attention soon</option>
                    <option value="high">High — Affecting operations</option>
                    <option value="critical">Critical — Safety hazard / completely broken</option>
                  </select>
                </div>
                <div class="input-group">
                  <label>Photo Evidence (optional)</label>
                  <input type="file" id="reportPhotos" accept="image/*" multiple>
                  <div class="preview-grid" id="reportPhotoPreview"></div>
                </div>
                <div class="input-group">
                  <label>Your Name (optional)</label>
                  <input type="text" id="reportName" placeholder="Anonymous">
                </div>
                <div class="input-group">
                  <label>Contact (optional)</label>
                  <input type="text" id="reportContact" placeholder="Phone or email for follow-up">
                </div>
                <button type="submit" class="btn btn-primary w-full" id="submitReport">
                  Submit Report
                </button>
              </form>
            </div>
          </div>
        </div>

        <div id="tab-history" class="hidden">
          <div id="historyList">
            <div class="spinner"></div>
          </div>
        </div>

        <div id="tab-issues" class="hidden">
          <div id="openIssuesList">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="public-footer">
      Powered by <a href="/">MaintainIQ</a> — Smart Maintenance Management
    </div>
  </div>

  <script type="module" src="/js/public-asset.js"></script>
</body>
</html>
