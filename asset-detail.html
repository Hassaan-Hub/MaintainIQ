<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Detail | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div id="loading" class="text-center p-12">
      <div class="spinner"></div>
    </div>

    <div id="content" class="hidden">
      <div class="flex items-start justify-between gap-4 mb-6 flex-wrap">
        <div>
          <a href="/assets.html" class="text-xs text-slate-500 no-underline flex items-center gap-1 mb-2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Assets
          </a>
          <h2 class="text-[1.5rem] font-bold" id="assetName"></h2>
          <p class="text-slate-500 text-sm" id="assetLocation"></p>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button class="btn btn-secondary btn-sm" id="viewQrBtn">View QR</button>
          <a class="btn btn-primary btn-sm" id="publicLink" href="#" target="_blank">Public Page</a>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-[1fr_2fr] gap-6 mb-6">
        <div class="card">
          <div id="assetPhoto" class="h-[200px] bg-slate-100 flex items-center justify-center rounded-xl overflow-hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" class="w-12 h-12"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="flex items-center gap-3 mb-4">
              <span class="asset-status-indicator" id="assetStatus"></span>
              <span class="badge badge-secondary" id="assetCategory"></span>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
              <div>
                <div class="text-slate-500 mb-1">Location</div>
                <div class="font-medium" id="detailLocation">-</div>
              </div>
              <div>
                <div class="text-slate-500 mb-1">Install Date</div>
                <div class="font-medium" id="detailInstall">-</div>
              </div>
              <div>
                <div class="text-slate-500 mb-1">Warranty Expiry</div>
                <div class="font-medium" id="detailWarranty">-</div>
              </div>
              <div>
                <div class="text-slate-500 mb-1">Total Issues</div>
                <div class="font-medium" id="detailTotalIssues">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card mb-6" id="recommendationsCard">
        <div class="card-header">
          <h3 class="flex items-center gap-2">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" class="w-[18px] h-[18px]"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Preventive Recommendations
          </h3>
        </div>
        <div class="card-body" id="recommendations">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="card mb-6">
        <div class="card-header">
          <h3>Issue History</h3>
          <a href="/issues.html" class="btn btn-secondary btn-sm">All Issues</a>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Description</th>
                <th>Status</th>
                <th>Urgency</th>
                <th>Assigned To</th>
                <th>Cost</th>
                <th>Reported</th>
                <th>Resolved</th>
              </tr>
            </thead>
            <tbody id="issueHistory">
              <tr><td colspan="8" class="text-center p-8"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Service Timeline</h3>
        </div>
        <div class="card-body" id="serviceTimeline">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="qrModal">
    <div class="modal max-w-[380px]">
      <div class="modal-header">
        <h3>Asset QR Code</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-display" id="qrDisplay"></div>
        <p class="text-center text-xs text-slate-500 mt-3">Scan to view asset & report issues</p>
      </div>
    </div>
  </div>

  <script type="module" src="/js/asset-detail.js"></script>
</body>
</html>
