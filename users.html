<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users | MaintainIQ</title>
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="msapplication-TileColor" content="#2563eb">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
  <button class="mobile-menu-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h2>Users</h2>
        <p class="text-slate-500 text-sm">Manage team members and their roles</p>
      </div>
    </div>

    <div class="stats-grid" id="userStats">
      <div class="stat-card">
        <div class="stat-icon bg-blue-50 text-blue-600">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="totalUsers">-</div>
          <div class="stat-label">Total Users</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon bg-green-50 text-green-600">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="adminCount">-</div>
          <div class="stat-label">Admins</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon bg-amber-50 text-amber-600">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="techCount">-</div>
          <div class="stat-label">Technicians</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon bg-purple-50 text-purple-600">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        </div>
        <div class="stat-info">
          <div class="stat-value" id="managerCount">-</div>
          <div class="stat-label">Managers</div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" placeholder="Search by name or email..." id="searchInput" class="min-w-[250px]">
      <select id="roleFilter">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="manager">Manager</option>
        <option value="technician">Technician</option>
        <option value="reporter">Reporter</option>
      </select>
    </div>

    <div class="card">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Role</th>
              <th>Phone</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-list">
            <tr><td colspan="6" class="text-center p-8"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="roleModal">
    <div class="modal max-w-[400px]">
      <div class="modal-header">
        <h3>Change User Role</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editUserId">
        <p class="text-sm text-slate-500 mb-4">User: <strong id="editUserName"></strong></p>
        <div class="input-group">
          <label>Role</label>
          <select id="editUserRole">
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
            <option value="technician">Technician</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelRoleBtn">Cancel</button>
        <button class="btn btn-primary" id="saveRoleBtn">Save Role</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/users.js"></script>
</body>
</html>
